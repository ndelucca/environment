# Grabación de pantalla (screencast) vía nd-screenrec (~/.local/bin).
# El wrapper elige backend en runtime: wl-screenrec (encode por HW) si está disponible,
# si no wf-recorder (CPU). Una sola grabación a la vez; repetir el atajo la frena y
# guarda el .mp4 en ~/Videos (avisa por notificación).
#   $mod+Print       -> pantalla completa (output enfocado) / frenar
#   $mod+Ctrl+Print  -> región (slurp) / frenar
bindsym $mod+Print      exec nd-screenrec toggle
bindsym $mod+Ctrl+Print exec nd-screenrec region
