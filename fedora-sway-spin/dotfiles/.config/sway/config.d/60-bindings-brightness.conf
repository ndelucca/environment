# Overrides /usr/share/sway/config.d/60-bindings-brightness.conf (same filename, so
# the $XDG_CONFIG_HOME copy wins). Routes the brightness keys through swayosd-client
# so they render the on-screen display (swayosd-server is started from sway/config).
bindsym XF86MonBrightnessUp   exec swayosd-client --brightness raise
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower
