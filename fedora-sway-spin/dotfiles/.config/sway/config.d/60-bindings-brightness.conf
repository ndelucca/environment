# Sobreescribe /usr/share/sway/config.d/60-bindings-brightness.conf (mismo nombre, así
# gana la copia de $XDG_CONFIG_HOME). Enruta las teclas de brillo a través de swayosd-client
# para que muestren el OSD en pantalla (swayosd-server se arranca desde sway/config).
bindsym XF86MonBrightnessUp   exec swayosd-client --brightness raise
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower
