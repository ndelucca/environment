# Inhibición de idle durante video a pantalla completa.
#
# `inhibit_idle fullscreen` solo inhibe el lock por idle mientras la ventana ESTÁ a
# pantalla completa (ver una peli, YouTube fullscreen), no en uso normal: al salir de
# fullscreen el idle del Spin (90-swayidle.conf, $screen_timeout/$lock_timeout) vuelve a
# aplicar. Complementa el toggle manual `idle_inhibitor` de waybar.
#
# app_ids alineados con las reglas de assign de navegadores de sway/config + mpv.
for_window [app_id="mpv"]                  inhibit_idle fullscreen
for_window [app_id="firefox"]              inhibit_idle fullscreen
for_window [app_id="chromium-browser"]     inhibit_idle fullscreen
for_window [app_id="google-chrome"]        inhibit_idle fullscreen
for_window [app_id="google-chrome-stable"] inhibit_idle fullscreen
