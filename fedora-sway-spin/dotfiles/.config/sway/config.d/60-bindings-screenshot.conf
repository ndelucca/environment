bindsym Print exec grim - | swappy -f -
bindsym Shift+Print exec grim -g "$(slurp)" - | wl-copy
bindsym $mod+Shift+Print exec grim -g "$(slurp)" - | swappy -f -

# Captura a ARCHIVO vía nd-screenshot (~/Pictures/Screenshots): guarda a disco, además
# copia al portapapeles y avisa por notificación. Complementa los binds de arriba
# (swappy/clipboard, que no guardan a disco).
bindsym Ctrl+Print exec nd-screenshot full
bindsym Ctrl+Shift+Print exec nd-screenshot region
