# Reglas de ventanas flotantes.
#
# Nota Wayland: xdg-shell NO expone un hint de "esto es un diálogo", así que no hay
# regla genérica que vuelva flotante a todo popup de cada app Wayland-nativa. Los
# menús popup / tooltips reales son xdg_popups y Sway ya los vuelve flotantes solo.
# Las reglas amplias window_type/window_role de abajo sólo matchean clientes XWayland
# (X11) -- justamente eso las hace seguras para ventanas Wayland. Cualquier cosa
# Wayland-nativa hay que matchearla por app_id, app por app, más abajo.

# --- Reglas amplias para XWayland (solo clientes X11; las ventanas Wayland no se ven afectadas) ---
for_window [window_type="dialog"]      floating enable
for_window [window_type="utility"]     floating enable
for_window [window_type="toolbar"]     floating enable
for_window [window_type="splash"]      floating enable
for_window [window_role="pop-up"]      floating enable
for_window [window_role="bubble"]      floating enable
for_window [window_role="task_dialog"] floating enable

# --- Picture-in-Picture: flotante, visible en todos los workspaces, sin borde ---
# Firefox usa "Picture-in-Picture"; Chromium usa "Picture in picture".
for_window [title="^Picture-in-Picture$"] floating enable, sticky enable, border none
for_window [title="^Picture in picture$"] floating enable, sticky enable, border none

# --- Apps Wayland-nativas elegidas que siempre deben ir flotantes y centradas ---
for_window [app_id="org.gnome.Calculator"] floating enable, move position center
for_window [app_id="org.gnome.Calendar"]   floating enable, move position center
for_window [app_id="nm-connection-editor"] floating enable, move position center
for_window [app_id="blueman-manager"]      floating enable, move position center
