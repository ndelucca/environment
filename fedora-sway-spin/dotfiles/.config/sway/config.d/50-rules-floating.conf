# Floating window rules.
#
# Wayland note: xdg-shell does NOT expose a "this is a dialog" hint, so there is
# no generic rule that floats every popup of every Wayland-native app. Real popup
# menus / tooltips are xdg_popups and Sway already floats them automatically.
# The blanket window_type/window_role rules below only ever match XWayland (X11)
# clients -- that is exactly what makes them safe for Wayland windows. Anything
# Wayland-native must be matched per-app by app_id below.

# --- XWayland blanket rules (X11 clients only; Wayland windows unaffected) ---
for_window [window_type="dialog"]      floating enable
for_window [window_type="utility"]     floating enable
for_window [window_type="toolbar"]     floating enable
for_window [window_type="splash"]      floating enable
for_window [window_role="pop-up"]      floating enable
for_window [window_role="bubble"]      floating enable
for_window [window_role="task_dialog"] floating enable

# --- Picture-in-Picture: float, keep visible across workspaces, no border ---
# Firefox uses "Picture-in-Picture"; Chromium uses "Picture in picture".
for_window [title="^Picture-in-Picture$"] floating enable, sticky enable, border none
for_window [title="^Picture in picture$"] floating enable, sticky enable, border none

# --- Curated Wayland-native apps that should always float, centered ---
for_window [app_id="org.gnome.Calculator"] floating enable, move position center
for_window [app_id="org.gnome.Calendar"]   floating enable, move position center
for_window [app_id="nm-connection-editor"] floating enable, move position center
for_window [app_id="blueman-manager"]      floating enable, move position center
