# Sobreescribe /usr/share/sway/config.d/60-bindings-volume.conf (mismo nombre, así
# gana la copia de $XDG_CONFIG_HOME). Enruta las teclas de volumen a través de swayosd-client
# para que muestren el OSD en pantalla (swayosd-server se arranca desde sway/config).
# `--locked` hace que sigan funcionando con la pantalla bloqueada.
bindsym --locked {
    XF86AudioRaiseVolume exec swayosd-client --output-volume raise --max-volume 100
    XF86AudioLowerVolume exec swayosd-client --output-volume lower --max-volume 100
    XF86AudioMute        exec swayosd-client --output-volume mute-toggle
    XF86AudioMicMute     exec swayosd-client --input-volume mute-toggle
}
