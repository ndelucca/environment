# Overrides /usr/share/sway/config.d/60-bindings-volume.conf (same filename, so the
# $XDG_CONFIG_HOME copy wins). Routes the volume keys through swayosd-client so they
# render the on-screen display (swayosd-server is started from sway/config).
# `--locked` keeps them working while the screen is locked.
bindsym --locked {
    XF86AudioRaiseVolume exec swayosd-client --output-volume raise --max-volume 100
    XF86AudioLowerVolume exec swayosd-client --output-volume lower --max-volume 100
    XF86AudioMute        exec swayosd-client --output-volume mute-toggle
    XF86AudioMicMute     exec swayosd-client --input-volume mute-toggle
}
