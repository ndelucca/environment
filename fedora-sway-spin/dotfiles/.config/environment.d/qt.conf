# Baseline para apps Qt en esta sesión Wayland/GTK. Aunque casi todo es GTK/Adwaita,
# dejamos cubierto que cualquier app Qt (el agente polkit del Spin, o una futura)
# corra en Wayland nativo y tome el tema oscuro de qt6ct. Leído por environment.d
# al inicio de sesión. El tema concreto vive en ~/.config/qt6ct/qt6ct.conf.
QT_QPA_PLATFORM=wayland;xcb
QT_QPA_PLATFORMTHEME=qt6ct
