[Appearance]
# Fusion + paleta oscura (esquema que trae qt6ct) para que las apps Qt salgan dark
# y acompañen al GTK/Adwaita-dark del resto de la sesión.
style=Fusion
custom_palette=true
color_scheme_path=/usr/share/qt6ct/colors/darker.conf
icon_theme=Adwaita
# Diálogos de archivo nativos GTK -> coherencia con el file picker del resto.
standard_dialogs=gtk3

[Interface]
cursor_flash_time=1000
double_click_interval=400
show_shortcuts_in_context_menus=true
